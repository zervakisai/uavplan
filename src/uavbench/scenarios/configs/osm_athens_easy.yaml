# OSM-realistic scenario: Downtown Athens (easy difficulty)
# Requires: data/maps/downtown.npz (generated by tools/osm_pipeline/)
name: "osm_athens_downtown_easy"
domain: "urban"
difficulty: "easy"

# OSM tile source
map_source: "osm"
osm_tile_id: "downtown"

# Map / physics (must match tile grid size)
map_size: 500
max_altitude: 10          # 10 levels × 10m = 100m flight ceiling

# Ignored for OSM (heightmap comes from tile):
building_density: 0.0
building_level: 0

# Start/goal policy
start_altitude: 2
safe_altitude: 8
min_start_goal_l1: 100

# Disturbances
wind: "none"
traffic: "none"
