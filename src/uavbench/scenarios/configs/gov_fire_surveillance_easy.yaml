name: gov_fire_surveillance_easy
mission_type: fire_surveillance
difficulty: easy
domain: urban
regime: naturalistic
paper_track: static

map_size: 50
map_source: synthetic
building_density: 0.18

fixed_start_xy: [5, 5]
fixed_goal_xy: [45, 45]
min_start_goal_l1: 20

# Budget: 6 * map_size = 300.  Two-leg missions (POI + goal) with
# suboptimal planners (APF ~1.5x inflation) need k=6 headroom.
max_episode_steps: 300

enable_fire: false
enable_traffic: false
enable_dynamic_nfz: false
fire_blocks_movement: false
traffic_blocks_movement: false
terminate_on_collision: true

fire_ignition_points: 0
num_emergency_vehicles: 0
force_replan_count: 0
