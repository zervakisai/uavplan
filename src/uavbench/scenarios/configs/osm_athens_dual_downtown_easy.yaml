# Dual-use: Downtown Athens urban fire + traffic — Easy
# Application: Urban fire response in dense city center
# Challenge: Navigate dense streets with fire spread and vehicle congestion
name: "osm_athens_dual_downtown_easy"
domain: "urban"
difficulty: "easy"

map_source: "osm"
osm_tile_id: "downtown"
map_size: 500
max_altitude: 10

building_density: 0.0
building_level: 0

start_altitude: 2
safe_altitude: 8
min_start_goal_l1: 150

wind: "none"
traffic: "none"

# Fire dynamics — urban fire
enable_fire: true
fire_blocks_movement: true
fire_ignition_points: 2
wind_direction: 1.571
wind_speed: 0.3

# Traffic dynamics
enable_traffic: true
traffic_blocks_movement: true
num_emergency_vehicles: 5
