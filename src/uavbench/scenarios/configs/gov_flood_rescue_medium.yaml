name: gov_flood_rescue_medium
mission_type: flood_rescue
difficulty: medium
domain: urban
regime: stress_test
paper_track: dynamic

map_size: 500
map_source: synthetic
building_density: 0.15

min_start_goal_l1: 100

enable_fire: true
enable_traffic: true
enable_dynamic_nfz: true
fire_blocks_movement: true
traffic_blocks_movement: true
terminate_on_collision: true

event_t1: 40
event_t2: 120

# Reduced from 2→1: building_density=0.15 (vs hard's 0.20) means more
# burnable area, so fewer ignition points are needed for equivalent fire load.
fire_ignition_points: 1
fire_buffer_radius: 2
num_emergency_vehicles: 8
num_corridor_vehicles: 2
num_nfz_zones: 1
force_replan_count: 1
replan_every_steps: 6
