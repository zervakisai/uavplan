# OSM-realistic scenario: Penteli foothills (easy + wildfire)
# Requires: data/maps/penteli.npz (generated by tools/osm_pipeline/)
name: "osm_athens_penteli_fire_easy"
domain: "urban"
difficulty: "easy"

# OSM tile source
map_source: "osm"
osm_tile_id: "penteli"

# Map / physics (must match tile grid size)
map_size: 500
max_altitude: 10

# Ignored for OSM (heightmap comes from tile):
building_density: 0.0
building_level: 0

# Start/goal policy
start_altitude: 2
safe_altitude: 8
min_start_goal_l1: 100

# Disturbances
wind: "none"
traffic: "none"

# Dynamic layers — wildfire
enable_fire: true
fire_blocks_movement: true
fire_ignition_points: 3
wind_direction: 0.0       # radians, 0 = North (fire spreads southward)
wind_speed: 0.6
