# Combined crisis: fire + traffic FORCE adaptive replanning
# fire_blocks_movement=true makes burning cells reject movement
# High vehicle count creates additional dynamic obstacles
name: "osm_athens_adaptive_crisis_hard"
domain: "urban"
difficulty: "hard"

map_source: "osm"
osm_tile_id: "downtown"
map_size: 500
max_altitude: 6

building_density: 0.0
building_level: 0

start_altitude: 2
safe_altitude: 5
min_start_goal_l1: 300

# Both dynamics active and blocking
enable_fire: true
fire_blocks_movement: true
fire_ignition_points: 7
wind_direction: 0.785
wind_speed: 0.7

enable_traffic: true
traffic_blocks_movement: true
num_emergency_vehicles: 20

wind: "none"
traffic: "none"
