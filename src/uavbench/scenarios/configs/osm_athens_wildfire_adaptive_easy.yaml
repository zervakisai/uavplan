# Wildfire scenario that FORCES adaptive replanning
# Fire spreads aggressively and blocks initial A* path
# fire_blocks_movement=true makes burning cells reject movement
name: "osm_athens_wildfire_adaptive_easy"
domain: "urban"
difficulty: "easy"

map_source: "osm"
osm_tile_id: "penteli"
map_size: 500
max_altitude: 10

building_density: 0.0
building_level: 0

start_altitude: 2
safe_altitude: 8
min_start_goal_l1: 200

# Aggressive fire to force replanning
enable_fire: true
fire_blocks_movement: true
fire_ignition_points: 5
wind_direction: 1.57
wind_speed: 0.8

enable_traffic: false

wind: "none"
traffic: "none"
