name: gov_flood_rescue_hard
mission_type: flood_rescue
difficulty: hard
domain: urban
regime: stress_test
paper_track: dynamic

map_size: 500
map_source: synthetic
# Same density as medium (0.15) to prevent buildings from acting as
# firebreaks that paradoxically reduce difficulty for adaptive planners.
# Difficulty comes from more fire ignitions, vehicles, NFZs, and forced replans.
building_density: 0.15

min_start_goal_l1: 100

enable_fire: true
enable_traffic: true
enable_dynamic_nfz: true
fire_blocks_movement: true
traffic_blocks_movement: true
terminate_on_collision: true

event_t1: 30
event_t2: 90

fire_ignition_points: 3
num_emergency_vehicles: 5
num_nfz_zones: 2
force_replan_count: 2
replan_every_steps: 6
