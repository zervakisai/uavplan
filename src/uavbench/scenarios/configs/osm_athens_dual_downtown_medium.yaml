# Dual-use: Downtown Athens urban fire + traffic — Medium
# Application: Multi-block urban fire with emergency response
# Challenge: More fire points, stronger wind, heavier traffic, lower ceiling
name: "osm_athens_dual_downtown_medium"
domain: "urban"
difficulty: "medium"

map_source: "osm"
osm_tile_id: "downtown"
map_size: 500
max_altitude: 8

building_density: 0.0
building_level: 0

start_altitude: 2
safe_altitude: 6
min_start_goal_l1: 200

wind: "none"
traffic: "none"

# Fire dynamics — moderate urban fire
enable_fire: true
fire_blocks_movement: true
fire_ignition_points: 4
wind_direction: 1.571
wind_speed: 0.5

# Traffic dynamics — moderate congestion
enable_traffic: true
traffic_blocks_movement: true
num_emergency_vehicles: 10
